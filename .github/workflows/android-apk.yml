name: Android APK

on:
  push:
    branches:
      - main
      - authorization-apk

concurrency:
  group: android-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: svarog-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Artifacts nejsou v gitu a časem expirují. Release „continuous“ drží jeden
      # trvalý odkaz ke stažení přímo u repozitáře (záložka Releases).
      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          DEST="svarog-debug-main.apk"
          cp "$SRC" "$DEST"
          if ! gh release view continuous --repo "${{ github.repository }}" &>/dev/null; then
            gh release create continuous \
              --repo "${{ github.repository }}" \
              --title "Main — debug APK" \
              --notes "Automatický debug build z větve \`main\`. Soubor **$DEST** se při každém pushi přepíše (stejný odkaz ke stažení)." \
              --prerelease
          fi
          gh release upload continuous --repo "${{ github.repository }}" "$DEST" --clobber
