name: Android APK

on:
  push:
    branches:
      - main
      - authorization-apk
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      # package.json: svarog-design a svarog-contracts jako file:../* — v CI musí být sourozenci vedle tohoto repa
      - name: Checkout svarog-design
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/svarog-design.git" \
            "${{ github.workspace }}/../svarog-design"

      - name: Checkout svarog-contracts
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/svarog-contracts.git" \
            "${{ github.workspace }}/../svarog-contracts"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Vite řeší TS přes tsconfig v designu (@vue/tsconfig); vue-tsc v clientu řeší typy z design .vue přes paths.vue v tsconfig.app.json
      - name: Install svarog-design dependencies
        working-directory: ${{ github.workspace }}/../svarog-design
        run: npm ci

      # dist/ je gitignored — musíme ho sestavit, aby vue-tsc vidělo typy
      - name: Build svarog-contracts
        working-directory: ${{ github.workspace }}/../svarog-contracts
        run: npm ci && npm run build

      - run: npm ci

      # Produční API URL musí existovat už při vite build (--mode production), jinak v APK zůstane localhost.
      # V nastavení repa: Secrets and variables → Actions → Repository secrets: VITE_API_URL = https://api.desperates.net
      # (bez koncového lomítka — v kódu se přidává /trpc)
      #
      # Tiles: ve WebView APK neexistuje stejný host jako u nasazené SPA — relativní /tiles by mířilo do prázdna.
      # Volitelný secret VITE_TILES_URL_PREFIX (bez koncového lomítka), např. https://game.desperates.net/tiles
      # Když chybí, použije se výchozí game.desperates.net (lze přepsat secretem pro stage jiného hosta).
      - name: Verify VITE_API_URL
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::Missing repository secret VITE_API_URL (např. https://api.desperates.net)."
            exit 1
          fi

      - name: Build web (production mode)
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TILES_URL_PREFIX: ${{ secrets.VITE_TILES_URL_PREFIX }}
        run: |
          set -euo pipefail
          if [ -z "${VITE_TILES_URL_PREFIX:-}" ]; then
            export VITE_TILES_URL_PREFIX="https://game.desperates.net/tiles"
            echo "VITE_TILES_URL_PREFIX prázdný — používám výchozí pro APK: $VITE_TILES_URL_PREFIX"
          fi
          npm run build:production

      - name: Sync Capacitor Android
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: svarog-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Artifacts nejsou v gitu a časem expirují. Release „continuous“ drží jeden
      # trvalý odkaz ke stažení přímo u repozitáře (záložka Releases).
      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          DEST="svarog-debug-main.apk"
          cp "$SRC" "$DEST"
          if ! gh release view continuous --repo "${{ github.repository }}" &>/dev/null; then
            gh release create continuous \
              --repo "${{ github.repository }}" \
              --title "Main — debug APK" \
              --notes "Automatický debug build z větve \`main\`. Soubor **$DEST** se při každém pushi přepíše (stejný odkaz ke stažení). Produční API: secret **\`VITE_API_URL\`**. Dlaždice v APK: volitelně **\`VITE_TILES_URL_PREFIX\`** (jinak \`https://game.desperates.net/tiles\`)." \
              --prerelease
          fi
          gh release upload continuous --repo "${{ github.repository }}" "$DEST" --clobber
